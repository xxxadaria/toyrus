<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - Toys R Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Toys R Us</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Главная</a></li>
                <li><a href="catalog.html" class="nav-link">Каталог</a></li>
                <li><a href="cart.html" class="nav-link">Корзина (<span id="cartCount">0</span>)</a></li>
                <li><a href="contacts.html" class="nav-link">Контакты</a></li>
                <li><a href="settings.html" class="nav-link active">⚙️ Настройки</a></li>
            </ul>
        </div>
    </nav>

    <main class="main">
        <!-- Мини-заголовок -->
        <section class="page-header">
            <h1>⚙️ Настройки профиля</h1>
        </section>

        <div class="settings-grid">
            <!-- Профиль -->
            <div class="setting-card">
                <div class="setting-header">
                    <h3>👤 Личные данные</h3>
                </div>
                <div class="form-row">
                    <div>
                        <label>Имя и фамилия</label>
                        <input type="text" id="userName" placeholder="Иван Иванов">
                    </div>
                    <div>
                        <label>Email</label>
                        <input type="email" id="userEmail" placeholder="ivan@example.com">
                    </div>
                </div>
                <div>
                    <label>Телефон</label>
                    <input type="tel" id="userPhone" placeholder="+7 (999) 123-45-67">
                </div>
            </div>

            <!-- Доставка -->
            <div class="setting-card">
                <div class="setting-header">
                    <h3>📦 Адрес доставки</h3>
                </div>
                <textarea id="deliveryAddress" rows="4" 
                    placeholder="ул. Ленина, д. 15, кв. 23&#10;Москва, 123456"></textarea>
            </div>

            <!-- Безопасность -->
            <div class="setting-card">
                <div class="setting-header">
                    <h3>🔐 Безопасность</h3>
                </div>
                <div class="form-row">
                    <div>
                        <label>Текущий пароль</label>
                        <input type="password" id="currentPassword" placeholder="••••••••">
                    </div>
                    <div>
                        <label>Новый пароль</label>
                        <input type="password" id="newPassword" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <!-- Уведомления -->
            <div class="setting-card">
                <div class="setting-header">
                    <h3>🔔 Уведомления</h3>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="newsletter" checked>
                    <span class="toggle-slider"></span>
                    <span>📧 Новости и акции</span>
                </label>
                <label class="toggle-switch">
                    <input type="checkbox" id="notifications">
                    <span class="toggle-slider"></span>
                    <span>🛒 Статус заказов</span>
                </label>
            </div>
        </div>

        <div class="settings-actions">
            <button class="btn btn-secondary" onclick="resetSettings()">🔄 Сбросить все</button>
            <button class="btn btn-primary" onclick="saveSettings()">💾 Сохранить изменения</button>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; Toys R Us<br> Подарки, которые ты давно искал<br> 
        Телефон: +7(800) 999-99-99<br>(Пн-Пт с 09:00-18:00) archive@toysrus.com</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
